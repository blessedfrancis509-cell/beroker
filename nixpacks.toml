[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd apexnetwork-main && npm ci"]

[phases.build]
cmds = ["cd apexnetwork-main && npm run build"]

[start]
cmd = "cd apexnetwork-main && NODE_ENV=production npx tsx server.ts"

[variables]
NODE_ENV = "production"
PORT = "3000"
DATABASE_PATH = "/data/database.json"